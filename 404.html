<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting to Hearthstone Design Build...</title>
  <script>
    // Preserve the path and redirect to the new domain
    var path = window.location.pathname;
    // Remove the repo prefix if served from github.io subdirectory
    path = path.replace(/^\/hearthstone-construction/, '');
    if (!path || path === '/') path = '';
    window.location.replace('https://hearthstonedesignbuild.com' + path);
  </script>
  <meta http-equiv="refresh" content="0;url=https://hearthstonedesignbuild.com">
  <link rel="canonical" href="https://hearthstonedesignbuild.com" />
</head>
<body>
  <p>This site has moved to <a href="https://hearthstonedesignbuild.com">hearthstonedesignbuild.com</a></p>
</body>
</html>
